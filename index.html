<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0D0D0D;font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px;color:#f5f5f5;user-select:none;touch-action:manipulation}
        .card{max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;gap:32px}
        .toggle{display:flex;gap:8px;background:#1a1a1a;padding:6px;border-radius:40px;box-shadow:0 0 0 1px #2a2a2a}
        .toggle button{background:0;border:0;padding:10px 22px;border-radius:32px;font-family:'Inter';font-weight:500;font-size:.95rem;letter-spacing:.3px;color:#9a9a9a;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:8px}
        .toggle button i{font-size:1rem;color:#7a7a7a}
        .toggle button.active{background:#2d2d2d;color:#f0f0f0;box-shadow:0 0 0 1px #3d3d3d}
        .toggle button.active i{color:#d0d0d0}
        .toggle button:active{transform:scale(.96)}
        
        .display-wrap{width:100%;position:relative;display:flex;flex-direction:column;align-items:center;gap:12px}
        .display{font-weight:500;font-size:4.2rem;letter-spacing:2px;padding:12px 0;text-align:center;width:100%;color:#f0f0f0;min-height:100px;display:flex;align-items:center;justify-content:center;font-family:'Inter';position:relative}
        
        .display-actions{display:flex;gap:8px;justify-content:center;width:100%}
        .display-actions button{background:#1a1a1a;border:0;border-radius:30px;color:#888;font-size:.75rem;padding:6px 16px;cursor:pointer;transition:.2s;font-family:'Inter';font-weight:400;letter-spacing:.3px;display:flex;align-items:center;gap:6px;border:1px solid #222}
        .display-actions button:hover{background:#2a2a2a;color:#ccc}
        .display-actions button i{font-size:.7rem}
        
        .cd-display{font-weight:500;font-size:4.2rem;letter-spacing:2px;color:#f0f0f0;padding:8px 24px;border-radius:12px;cursor:pointer;background:0;border:2px solid transparent;min-width:280px;text-align:center;font-family:'Inter';transition:all .3s ease}
        .cd-display:active{background:#1a1a1a;border-color:#2a2a2a}
        .cd-display.editing{background:#1a1a1a;border-color:#3a3a3a}
        .cd-display .time{display:inline-block;letter-spacing:4px}
        .cd-display .cursor{display:none}
        .cd-display.editing .cursor{display:inline-block;width:2px;height:.8em;background:#8a8a8a;animation:blink 1s step-end infinite;margin-left:2px;vertical-align:text-bottom}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
        
        .controls{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:12px;margin-top:8px}
        .ctrl{background:#1c1c1c;border:0;border-radius:40px;color:#d0d0d0;font-family:'Inter';font-weight:500;font-size:.9rem;padding:12px 20px;min-width:70px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:.15s;box-shadow:0 0 0 1px #2a2a2a;letter-spacing:.3px}
        .ctrl i{font-size:1rem;color:#b0b0b0}
        .ctrl:active{transform:scale(.94);background:#282828}
        .ctrl.primary{background:#2a2a2a;box-shadow:0 0 0 1px #3d3d3d}
        .ctrl.primary i{color:#e0e0e0}
        .ctrl.danger{background:#2a1a1a;box-shadow:0 0 0 1px #4a2a2a;color:#e8b0b0}
        .ctrl.danger i{color:#d48a8a}
        .ctrl:disabled{opacity:.35;pointer-events:none}
        
        .laps-wrap{width:100%;margin-top:24px;border-radius:16px;background:#111;border:1px solid #222;overflow:hidden;transition:all .3s ease}
        .laps-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer;color:#999;font-family:'Inter';font-size:.85rem;font-weight:500;letter-spacing:.3px;transition:background .2s}
        .laps-header:hover{background:#1a1a1a}
        .laps-header i{font-size:.8rem;transition:transform .3s ease;color:#666}
        .laps-header .count{color:#555;font-size:.75rem}
        .laps-header .count span{color:#888;font-weight:600}
        .laps-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
        .laps-body.open{max-height:400px}
        .laps{max-height:340px;overflow-y:auto;padding:4px 8px 8px;scrollbar-width:thin;scrollbar-color:#2a2a2a transparent}
        .laps::-webkit-scrollbar{width:4px}
        .laps::-webkit-scrollbar-track{background:0}
        .laps::-webkit-scrollbar-thumb{background:#333;border-radius:12px}
        .lap{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;margin:4px 0;background:#161616;border-radius:30px;border:1px solid #222;font-size:.85rem;letter-spacing:.3px;animation:fadeIn .2s ease;gap:10px}
        .lap .lap-info{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
        .lap .lap-number{color:#555;font-weight:600;font-size:.75rem;min-width:32px;letter-spacing:.5px}
        .lap .lap-name{color:#d0d0d0;font-weight:500;font-size:.85rem;cursor:pointer;transition:.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:4px 8px;border-radius:6px;margin:-4px -8px}
        .lap .lap-name:hover{background:#1a1a1a;color:#fff}
        .lap .lap-name.editing-name{background:#1a2a2a;color:#8ac;padding:2px 6px;margin:-2px -6px}
        .lap .lap-time{font-weight:500;color:#ddd;white-space:nowrap;margin-left:auto;font-size:.9rem}
        .lap .lap-actions{display:flex;gap:6px;margin-left:4px}
        .lap .lap-actions button{background:0;border:0;color:#555;cursor:pointer;padding:4px 8px;border-radius:16px;font-size:.7rem;transition:.2s}
        .lap .lap-actions button:hover{color:#888;background:#1a1a1a}
        .lap .lap-actions button.del:hover{color:#e8b0b0;background:#2a1a1a}
        .lap-name-input{background:#0d0d0d;border:1px solid #3a3a3a;border-radius:6px;color:#e0e0e0;font-family:'Inter';font-size:.85rem;padding:4px 8px;width:120px;outline:0;font-weight:500}
        .lap-name-input:focus{border-color:#5a5a5a}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .hide{display:none!important}
        .flex{display:flex;align-items:center;justify-content:center}
        .gap{gap:8px}
        
        .numpad{position:fixed;bottom:0;left:0;right:0;background:#141414;padding:16px 20px 30px;border-top:1px solid #2a2a2a;display:none;z-index:1000}
        .numpad.active{display:block}
        .numpad .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:400px;margin:0 auto}
        .numpad .btn{background:#1c1c1c;border:0;border-radius:12px;padding:18px;font-size:1.8rem;font-family:'Inter';font-weight:500;color:#f0f0f0;cursor:pointer;transition:.1s;box-shadow:0 0 0 1px #2a2a2a}
        .numpad .btn:active{transform:scale(.92);background:#2a2a2a}
        .numpad .btn.clr{background:#2a1a1a;color:#e8b0b0;box-shadow:0 0 0 1px #4a2a2a}
        .numpad .btn.clr:active{background:#3a1a1a}
        .numpad .btn.done{background:#1a2a1a;color:#90d090;box-shadow:0 0 0 1px #2a4a2a}
        .numpad .btn.done:active{background:#1a3a1a}
        
        .expand-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#0D0D0D;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px}
        .expand-overlay.active{display:flex}
        .expand-overlay .expand-time{font-size:8rem;font-weight:500;font-family:'Inter';color:#f0f0f0;letter-spacing:4px}
        .expand-overlay .expand-close{position:absolute;top:20px;right:20px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:40px;color:#888;padding:10px 20px;cursor:pointer;font-family:'Inter';font-size:.85rem;transition:.2s;display:flex;align-items:center;gap:8px}
        .expand-overlay .expand-close:hover{background:#2a2a2a;color:#ccc}
        .expand-overlay .expand-close i{font-size:.9rem}
        .expand-overlay .expand-sub{position:absolute;bottom:40px;color:#333;font-size:.8rem;font-family:'Inter';letter-spacing:1px}
        
        .save-status{font-size:.65rem;color:#444;text-align:center;padding:2px 0;transition:.3s}
        .save-status.saved{color:#6a8}
        
        @media(max-width:480px){.display{font-size:3.2rem;min-height:80px}.cd-display{font-size:3.2rem;min-width:200px;padding:6px 16px}.ctrl{padding:10px 16px;min-width:60px;font-size:.8rem}.numpad .btn{padding:14px;font-size:1.5rem}.lap{padding:8px 12px;gap:6px}.lap .lap-number{font-size:.65rem;min-width:24px}.lap .lap-name{font-size:.75rem}.lap .lap-time{font-size:.8rem}.lap-name-input{width:80px;font-size:.75rem}.expand-overlay .expand-time{font-size:4.5rem}.expand-overlay .expand-close{top:12px;right:12px;padding:8px 16px;font-size:.75rem}}
    </style>
</head>
<body>
<div class="card" id="mainCard">
    <div class="toggle">
        <button class="active" id="swMode"><i class="fas fa-stopwatch"></i> Stopwatch</button>
        <button id="cdMode"><i class="fas fa-hourglass-half"></i> Countdown</button>
    </div>

    <div class="display-wrap">
        <div class="display" id="displayWrap">
            <span id="swTime">00:00.0</span>
            <div id="cdWrap" class="hide" style="width:100%;display:flex;justify-content:center;">
                <div class="cd-display" id="cdDisplay">
                    <span class="time" id="cdTime">00:00:00</span>
                    <span class="cursor"></span>
                </div>
            </div>
        </div>
        <div class="display-actions">
            <button id="expandBtn"><i class="fas fa-expand"></i> Expand</button>
        </div>
    </div>

    <div class="controls">
        <div id="swCtrl" class="flex gap">
            <button class="ctrl primary" id="swPlay"><i class="fas fa-play"></i> Start</button>
            <button class="ctrl" id="swPause" disabled><i class="fas fa-pause"></i> Stop</button>
            <button class="ctrl" id="swLap" disabled><i class="fas fa-flag"></i> Lap</button>
            <button class="ctrl danger" id="swReset"><i class="fas fa-undo-alt"></i> Reset</button>
        </div>
        <div id="cdCtrl" class="flex gap hide">
            <button class="ctrl primary" id="cdPlay"><i class="fas fa-play"></i> Start</button>
            <button class="ctrl" id="cdPause" disabled><i class="fas fa-pause"></i> Pause</button>
            <button class="ctrl" id="cdRestart"><i class="fas fa-redo-alt"></i> Restart</button>
            <button class="ctrl danger" id="cdClear"><i class="fas fa-times"></i> Clear</button>
        </div>
    </div>

    <div class="laps-wrap" id="lapsWrap">
        <div class="laps-header" id="lapsToggle">
            <span><i class="fas fa-flag"></i> Laps <span class="count">(<span id="lapCount">0</span>)</span></span>
            <i class="fas fa-chevron-down" id="lapsArrow"></i>
        </div>
        <div class="laps-body" id="lapsBody">
            <div class="laps" id="laps"></div>
        </div>
    </div>
    
    <div class="save-status" id="saveStatus">saved</div>
</div>

<div class="expand-overlay" id="expandOverlay">
    <button class="expand-close" id="expandClose"><i class="fas fa-compress"></i> Close</button>
    <div class="expand-time" id="expandTime">00:00.0</div>
    <div class="expand-sub">tap anywhere to close</div>
</div>

<div class="numpad" id="numpad">
    <div class="grid">
        <button class="btn" data-v="1">1</button>
        <button class="btn" data-v="2">2</button>
        <button class="btn" data-v="3">3</button>
        <button class="btn clr" id="npDel">⌫</button>
        <button class="btn" data-v="4">4</button>
        <button class="btn" data-v="5">5</button>
        <button class="btn" data-v="6">6</button>
        <button class="btn clr" id="npReset">✕</button>
        <button class="btn" data-v="7">7</button>
        <button class="btn" data-v="8">8</button>
        <button class="btn" data-v="9">9</button>
        <button class="btn done" id="npDone">✓</button>
        <button class="btn" data-v="0" style="grid-column:span 2">0</button>
        <button class="btn" data-v="00">00</button>
    </div>
</div>

<script>
(()=>{
    let mode='sw';
    let swI=null, swT=0, swR=!1, lapC=0, lapD=[], lapsOpen=!1;
    let swStartTimestamp=0, swPausedTime=0;
    
    let cdI=null, cdT=0, cdInit=0, cdR=!1, cdP=!1, cdEdit=!1, cdVal='00:00:00';
    let cdStartTimestamp=0, cdRemaining=0;
    
    let expanded=!1;

    const $=id=>document.getElementById(id);
    const swMode=$('swMode'), cdMode=$('cdMode'), swTime=$('swTime'), cdWrap=$('cdWrap'), cdDisplay=$('cdDisplay'), cdTime=$('cdTime');
    const swPlay=$('swPlay'), swPause=$('swPause'), swLap=$('swLap'), swReset=$('swReset');
    const cdPlay=$('cdPlay'), cdPause=$('cdPause'), cdRestart=$('cdRestart'), cdClear=$('cdClear');
    const laps=$('laps'), swCtrl=$('swCtrl'), cdCtrl=$('cdCtrl'), numpad=$('numpad');
    const npDel=$('npDel'), npReset=$('npReset'), npDone=$('npDone');
    const lapsToggle=$('lapsToggle'), lapsBody=$('lapsBody'), lapsArrow=$('lapsArrow'), lapCount=$('lapCount');
    const expandBtn=$('expandBtn'), expandOverlay=$('expandOverlay'), expandTime=$('expandTime'), expandClose=$('expandClose');
    const saveStatus=$('saveStatus');

    const fmt=(t)=>{let s=Math.floor(t/10), m=Math.floor(s/60), sec=s%60, d=t%10; return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${d}`};
    const fmtHMS=(s)=>{let h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`};
    const parseHMS=(s)=>{let p=s.split(':').map(Number); return p.length===3?p[0]*3600+p[1]*60+p[2]:0};

    const saveData=()=>{
        try{
            const data={
                swT,swR,lapC,lapD,swPausedTime,
                cdT,cdInit,cdR,cdP,cdVal,cdRemaining,
                mode
            };
            localStorage.setItem('timer_data',JSON.stringify(data));
            saveStatus.textContent='saved';
            saveStatus.className='save-status saved';
            setTimeout(()=>{saveStatus.className='save-status'},1500);
        }catch(e){}
    };

    const loadData=()=>{
        try{
            const raw=localStorage.getItem('timer_data');
            if(!raw)return false;
            const data=JSON.parse(raw);
            swT=data.swT||0;
            swR=data.swR||false;
            lapC=data.lapC||0;
            lapD=data.lapD||[];
            swPausedTime=data.swPausedTime||0;
            cdT=data.cdT||0;
            cdInit=data.cdInit||0;
            cdR=data.cdR||false;
            cdP=data.cdP||false;
            cdVal=data.cdVal||'00:00:00';
            cdRemaining=data.cdRemaining||0;
            if(data.mode)mode=data.mode;
            return true;
        }catch(e){return false}
    };

    const updateButtons=()=>{
        if(mode==='sw'){
            swPlay.disabled=swR;
            swPause.disabled=!swR;
            swLap.disabled=!swR;
        }else{
            cdPlay.disabled=cdR;
            cdPause.disabled=!cdR;
        }
    };

    const getCurrentTime=()=>mode==='sw'?fmt(swT):fmtHMS(cdT);

    const toggleExpand=()=>{
        expanded=!expanded;
        if(expanded){
            expandTime.textContent=getCurrentTime();
            expandOverlay.classList.add('active');
            document.body.style.overflow='hidden';
        }else{
            expandOverlay.classList.remove('active');
            document.body.style.overflow='';
        }
    };

    const updateExpandTime=()=>{
        if(expanded) expandTime.textContent=getCurrentTime();
    };

    expandBtn.onclick=toggleExpand;
    expandClose.onclick=toggleExpand;
    expandOverlay.onclick=(e)=>{if(e.target===expandOverlay)toggleExpand()};

    const toggleLaps=()=>{lapsOpen=!lapsOpen; lapsBody.classList.toggle('open'); lapsArrow.style.transform=lapsOpen?'rotate(180deg)':'rotate(0)'};
    lapsToggle.onclick=toggleLaps;

    const renameLap=(idx,newName)=>{
        if(idx>=0 && idx<lapD.length){
            lapD[idx].name=newName.trim()||`Lap ${idx+1}`;
            renderLaps();
            saveData();
        }
    };

    const deleteLap=(idx)=>{
        if(idx>=0 && idx<lapD.length){
            lapD.splice(idx,1);
            lapD.forEach((l,i)=>l.label=`Lap ${i+1}`);
            renderLaps();
            if(lapD.length===0){lapCount.textContent='0'; laps.innerHTML='<div style="text-align:center;color:#444;font-size:.8rem;padding:16px 8px">no laps yet</div>'}
            saveData();
        }
    };

    const renderLaps=()=>{
        if(lapD.length){
            laps.innerHTML=lapD.slice().reverse().map((l,i)=>{
                const idx=lapD.length-1-i;
                return `<div class="lap" data-idx="${idx}">
                    <div class="lap-info">
                        <span class="lap-number">#${idx+1}</span>
                        <span class="lap-name" onclick="window.editLap(${idx})" id="lapName_${idx}">${l.name||`Lap ${idx+1}`}</span>
                    </div>
                    <span class="lap-time">${fmt(l.diff)}</span>
                    <div class="lap-actions">
                        <button onclick="window.editLap(${idx})" title="Rename"><i class="fas fa-pen" style="font-size:.65rem"></i></button>
                        <button class="del" onclick="window.deleteLap(${idx})" title="Delete"><i class="fas fa-times" style="font-size:.65rem"></i></button>
                    </div>
                </div>`;
            }).join('');
            lapCount.textContent=lapD.length;
        }else{
            laps.innerHTML='<div style="text-align:center;color:#444;font-size:.8rem;padding:16px 8px">no laps yet</div>';
            lapCount.textContent='0';
        }
        if(lapD.length>0 && !lapsOpen){toggleLaps()}
    };

    window.editLap=(idx)=>{
        const el=document.getElementById(`lapName_${idx}`);
        if(!el)return;
        const current=lapD[idx].name||`Lap ${idx+1}`;
        const input=document.createElement('input');
        input.className='lap-name-input';
        input.value=current;
        input.maxLength=30;
        el.replaceWith(input);
        input.focus();
        input.select();
        const finish=()=>{
            const val=input.value.trim()||`Lap ${idx+1}`;
            renameLap(idx,val);
        };
        input.onblur=finish;
        input.onkeydown=(e)=>{if(e.key==='Enter'){input.blur()} if(e.key==='Escape'){input.value=current; input.blur()}};
    };

    window.deleteLap=deleteLap;

    const swTick=()=>{
        const now=Date.now();
        const elapsedMs=now - swStartTimestamp;
        swT = swPausedTime + Math.floor(elapsedMs/100);
        swTime.textContent=fmt(swT);
        updateExpandTime();
    };
    
    const swStart=()=>{
        if(swR)return;
        swR=true;
        swStartTimestamp=Date.now();
        swPausedTime=swT;
        swI=setInterval(swTick,100);
        swPlay.disabled=true;
        swPause.disabled=false;
        swLap.disabled=false;
        swPlay.innerHTML='<i class="fas fa-play"></i> Start';
        saveData();
    };
    
    const swStop=()=>{
        if(!swR)return;
        swR=false;
        clearInterval(swI);
        swI=null;
        swPausedTime=swT;
        swStartTimestamp=0;
        swPlay.disabled=false;
        swPause.disabled=true;
        swLap.disabled=true;
        swPlay.innerHTML='<i class="fas fa-play"></i> Resume';
        saveData();
    };
    
    const swResetF=()=>{
        swStop();
        swT=0;
        swPausedTime=0;
        swStartTimestamp=0;
        lapC=0;
        lapD=[];
        swTime.textContent=fmt(0);
        renderLaps();
        swPlay.disabled=false;
        swPause.disabled=true;
        swLap.disabled=true;
        swPlay.innerHTML='<i class="fas fa-play"></i> Start';
        updateExpandTime();
        saveData();
    };
    
    const swLapF=()=>{
        if(!swR)return;
        lapC++;
        let diff=swT-(lapD.length?lapD[lapD.length-1].total:0);
        lapD.push({total:swT,diff:diff,name:`Lap ${lapC}`});
        renderLaps();
        saveData();
    };

    const cdUpdate=()=>{
        cdTime.textContent=fmtHMS(cdT);
        cdVal=fmtHMS(cdT);
        updateExpandTime();
        saveData();
    };
    
    const cdTick=()=>{
        const now=Date.now();
        const elapsedSec=Math.floor((now - cdStartTimestamp)/1000);
        cdT = Math.max(0, cdRemaining - elapsedSec);
        cdTime.textContent=fmtHMS(cdT);
        cdVal=fmtHMS(cdT);
        updateExpandTime();
        
        if(cdT<=0){
            clearInterval(cdI);
            cdI=null;
            cdR=false;
            cdP=false;
            cdT=0;
            cdRemaining=0;
            cdStartTimestamp=0;
            cdUpdate();
            cdPlay.disabled=false;
            cdPause.disabled=true;
            cdPlay.innerHTML='<i class="fas fa-play"></i> Start';
            saveData();
        }
    };
    
    const cdStart=()=>{
        if(cdR||cdT<=0)return;
        cdR=true;
        cdP=false;
        cdStartTimestamp=Date.now();
        cdRemaining=cdT;
        cdPlay.disabled=true;
        cdPause.disabled=false;
        cdPlay.innerHTML='<i class="fas fa-play"></i> Start';
        cdI=setInterval(cdTick,1000);
        closeNumpad();
        saveData();
    };
    
    const cdPauseF=()=>{
        if(!cdR)return;
        clearInterval(cdI);
        cdI=null;
        cdR=false;
        cdP=true;
        cdPlay.disabled=false;
        cdPause.disabled=true;
        cdPlay.innerHTML='<i class="fas fa-play"></i> Resume';
        saveData();
    };
    
    const cdRestartF=()=>{
        clearInterval(cdI);
        cdI=null;
        cdR=false;
        cdP=false;
        cdT=cdInit;
        cdRemaining=cdInit;
        cdStartTimestamp=0;
        cdUpdate();
        cdPlay.disabled=false;
        cdPause.disabled=true;
        cdPlay.innerHTML='<i class="fas fa-play"></i> Start';
        saveData();
    };
    
    const cdClearF=()=>{
        clearInterval(cdI);
        cdI=null;
        cdR=false;
        cdP=false;
        cdT=0;
        cdInit=0;
        cdRemaining=0;
        cdStartTimestamp=0;
        cdUpdate();
        cdPlay.disabled=false;
        cdPause.disabled=true;
        cdPlay.innerHTML='<i class="fas fa-play"></i> Start';
        saveData();
    };

    const openNumpad=()=>{
        if(cdR||cdP)return;
        cdEdit=true;
        cdDisplay.classList.add('editing');
        numpad.classList.add('active');
        cdTime.textContent=cdVal;
    };
    
    const closeNumpad=()=>{
        cdEdit=false;
        cdDisplay.classList.remove('editing');
        numpad.classList.remove('active');
        cdT=parseHMS(cdTime.textContent);
        cdInit=cdT;
        cdRemaining=cdT;
        cdUpdate();
        saveData();
    };
    
    const npInput=(v)=>{
        if(!cdEdit)return;
        let c=cdTime.textContent.replace(/:/g,'')+v;
        if(c.length>6)c=c.slice(-6);
        while(c.length<6)c='0'+c;
        cdTime.textContent=`${c.slice(0,2)}:${c.slice(2,4)}:${c.slice(4,6)}`;
        cdVal=cdTime.textContent;
    };
    
    const npDelF=()=>{
        if(!cdEdit)return;
        let c=cdTime.textContent.replace(/:/g,'');
        if(c.length)c=c.slice(0,-1);
        while(c.length<6)c='0'+c;
        cdTime.textContent=`${c.slice(0,2)}:${c.slice(2,4)}:${c.slice(4,6)}`;
        cdVal=cdTime.textContent;
    };
    
    const npResetF=()=>{
        if(!cdEdit)return;
        cdTime.textContent='00:00:00';
        cdVal='00:00:00';
    };

    const setMode=(m)=>{
        if(m===mode)return;

        if(swI){clearInterval(swI); swI=null;}
        if(cdI){clearInterval(cdI); cdI=null;}
        
        closeNumpad();
        
        if(m==='sw'){
            mode='sw';
            swTime.classList.remove('hide');
            cdWrap.classList.add('hide');
            swCtrl.classList.remove('hide');
            cdCtrl.classList.add('hide');
            document.getElementById('lapsWrap').style.display='block';
            swMode.classList.add('active');
            cdMode.classList.remove('active');

            if(swR){
                swStartTimestamp=Date.now();
                swPausedTime=swT;
                swI=setInterval(swTick,100);
                swPlay.disabled=true;
                swPause.disabled=false;
                swLap.disabled=false;
            }

            if(cdR && cdT>0){
                cdStartTimestamp=Date.now();
                cdRemaining=cdT;
                cdI=setInterval(cdTick,1000);
                cdPlay.disabled=true;
                cdPause.disabled=false;
            }
        }else{
            mode='cd';
            swTime.classList.add('hide');
            cdWrap.classList.remove('hide');
            swCtrl.classList.add('hide');
            cdCtrl.classList.remove('hide');
            document.getElementById('lapsWrap').style.display='none';
            cdMode.classList.add('active');
            swMode.classList.remove('active');

            if(cdR && cdT>0){
                cdStartTimestamp=Date.now();
                cdRemaining=cdT;
                cdI=setInterval(cdTick,1000);
                cdPlay.disabled=true;
                cdPause.disabled=false;
            }

            if(swR){
                swStartTimestamp=Date.now();
                swPausedTime=swT;
                swI=setInterval(swTick,100);
                swPlay.disabled=true;
                swPause.disabled=false;
                swLap.disabled=false;
            }
        }
        updateExpandTime();
        saveData();
    };

    swMode.onclick=()=>setMode('sw'); 
    cdMode.onclick=()=>setMode('cd');
    swPlay.onclick=swStart; 
    swPause.onclick=swStop; 
    swLap.onclick=swLapF; 
    swReset.onclick=swResetF;
    cdPlay.onclick=cdStart; 
    cdPause.onclick=cdPauseF; 
    cdRestart.onclick=cdRestartF; 
    cdClear.onclick=cdClearF;
    cdDisplay.onclick=openNumpad;

    document.querySelectorAll('.numpad .btn[data-v]').forEach(function(b) {
        b.addEventListener('click', function() {
            npInput(this.getAttribute('data-v'));
        });
    });
    npDel.addEventListener('click', npDelF); 
    npReset.addEventListener('click', npResetF); 
    npDone.addEventListener('click', closeNumpad);
    numpad.addEventListener('click', function(e) {
        if(e.target === numpad) closeNumpad();
    });

    document.addEventListener('visibilitychange', function() {
        if(!document.hidden){
            if(swR && swStartTimestamp>0){
                const now=Date.now();
                const elapsedMs=now - swStartTimestamp;
                swT = swPausedTime + Math.floor(elapsedMs/100);
                swTime.textContent=fmt(swT);
                updateExpandTime();
                saveData();
            }
            if(cdR && cdStartTimestamp>0){
                const now=Date.now();
                const elapsedSec=Math.floor((now - cdStartTimestamp)/1000);
                cdT = Math.max(0, cdRemaining - elapsedSec);
                cdTime.textContent=fmtHMS(cdT);
                cdVal=fmtHMS(cdT);
                updateExpandTime();
                if(cdT<=0){
                    clearInterval(cdI);
                    cdI=null;
                    cdR=false;
                    cdP=false;
                    cdT=0;
                    cdRemaining=0;
                    cdStartTimestamp=0;
                    cdPlay.disabled=false;
                    cdPause.disabled=true;
                    cdPlay.innerHTML='<i class="fas fa-play"></i> Start';
                }
                saveData();
            }
        }
    });

    const loaded=loadData();

    swTime.textContent=fmt(swT);
    cdTime.textContent=fmtHMS(cdT);
    cdVal=fmtHMS(cdT);

    if(mode==='sw'){
        swTime.classList.remove('hide');
        cdWrap.classList.add('hide');
        swCtrl.classList.remove('hide');
        cdCtrl.classList.add('hide');
        document.getElementById('lapsWrap').style.display='block';
        swMode.classList.add('active');
        cdMode.classList.remove('active');
    }else{
        swTime.classList.add('hide');
        cdWrap.classList.remove('hide');
        swCtrl.classList.add('hide');
        cdCtrl.classList.remove('hide');
        document.getElementById('lapsWrap').style.display='none';
        cdMode.classList.add('active');
        swMode.classList.remove('active');
    }
    
    renderLaps();
    updateButtons();
    updateExpandTime();

    if(swR && mode==='sw'){
        swStartTimestamp=Date.now();
        swPausedTime=swT;
        swI=setInterval(swTick,100);
        swPlay.disabled=true;
        swPause.disabled=false;
        swLap.disabled=false;
        swPlay.innerHTML='<i class="fas fa-play"></i> Start';
    }
    
    if(cdR && mode==='cd' && cdT>0){
        cdStartTimestamp=Date.now();
        cdRemaining=cdT;
        cdI=setInterval(cdTick,1000);
        cdPlay.disabled=true;
        cdPause.disabled=false;
        cdPlay.innerHTML='<i class="fas fa-play"></i> Start';
    }
    
    saveData();
})()
</script>
</body>
</html>
